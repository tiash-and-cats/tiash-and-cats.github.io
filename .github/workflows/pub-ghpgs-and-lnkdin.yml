# Deloys to GitHub Pages before posting the latest blog to LinkedIn
name: publish to GitHub Pages + LinkedIn

on:
    # Runs on pushes targeting the default branch
    push:
        branches: ["master"]

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment and committing changes
permissions:
    contents: write      # Elevated from 'read' so the script can commit back to front matter
    pages: write
    id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
    group: "pages-and-linkedin"
    cancel-in-progress: false

jobs:
    # Build job
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              
            - name: Setup Pages
              uses: actions/configure-pages@v5
              
            - name: Build with Jekyll
              uses: actions/jekyll-build-pages@v1
              with:
                  source: ./
                  destination: ./_site
                  
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3

    # Deployment job
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5

    # LinkedIn Distribution Job
    linkedin:
        runs-on: ubuntu-latest
        needs: deploy   # Ensures LinkedIn only broadcasts if the site deploys successfully
        steps:
            - name: Checkout Source Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Pulls full git history for accurate file creation times

            - name: Setup Python Runtime
              uses: actions/setup-python@v5
              with:
                  python-version: '3.14'
  
            - name: Install Dependencies
              run: pip install requests python-frontmatter
  
            # Executes the post evaluation script
            - name: Run Auto-Posting Script
              env:
                  LNKDIN_ACCESS_TOKEN: ${{ secrets.LNKDIN_ACCESS_TOKEN }}
              run: python .github/scripts/linkedin_share.py
  
            # Automatically commits the updated Markdown frontmatter back to master
            - name: Commit Frontmatter Changes
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: "automation: update linkedin distribution flag [skip ci]"
                  file_pattern: '_posts/*.md'