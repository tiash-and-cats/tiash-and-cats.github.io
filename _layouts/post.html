---
layout: default
---

<article class="post-container">
  <header class="post-header" style="margin-bottom: 2rem; border-bottom: 1px solid #e1e4e8; padding-bottom: 1rem;">
    <h1 style="margin-bottom: 0.5rem;">{{ page.title }}</h1>
    
    {% if page.date %}
      <p><em><time datetime="{{ page.date | date_to_xmlschema }}">
        Published on {{ page.date | date: "%B %d, %Y" }}
      </time></em></p>
    {% endif %}

    {% if page.tags %}
      <p><em>Tags: {{ page.tags | join: ", " }}</em></p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
